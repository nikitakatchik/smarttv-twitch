name: Feature request
description: Suggest a Twellie improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests focused on Twellie itself. Twellie does not bypass DRM, subscriptions, geoblocks, bans, authentication restrictions, or platform security mechanisms.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should Twellie do differently?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Relevant platform
      options:
        - All
        - Orsay
        - Tizen
        - TizenBrew
        - Browser/web preview
        - Unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
