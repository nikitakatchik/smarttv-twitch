name: release

# Tag a commit `vX.Y.Z` and push the tag to cut a release with one package
# per generation attached:  git tag v4.0.0 && git push origin v4.0.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # The Orsay host bundles the signed Node runtime, so it's packaged per target
  # OS/arch. setup-node provides the official signed/notarized Node builds, which
  # we ship unmodified so they keep their signature (no Gatekeeper/SmartScreen).
  host-binaries:
    name: host (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, label: macOS arm64 }   # Apple Silicon
          - { os: macos-13,     label: macOS x64 }      # Intel
          - { os: windows-latest, label: Windows x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build native host binary
        run: npm run host:bin
      - uses: actions/upload-artifact@v4
        with:
          name: host-${{ matrix.os }}
          path: dist/release/twellie-orsay-host-*.zip
          if-no-files-found: error

  release:
    needs: host-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify
        run: npm run lint && npm test
      # The host installers come from the per-OS matrix above; drop them where
      # `publish` looks so it reuses them instead of cross-building.
      - name: Download host binaries
        uses: actions/download-artifact@v4
        with:
          pattern: host-*
          path: dist/host-bins
          merge-multiple: true
      - name: Gather host installers
        run: mkdir -p dist/release && cp dist/host-bins/*.zip dist/release/
      # Fetch the CLI-only Tizen SDK so `publish` can build + sign Twellie.wgt
      # (generic cert; Apps2Samsung re-signs per-TV). Best-effort: if it fails,
      # publish still ships the other assets and just omits the .wgt.
      - name: Set up Tizen CLI (for the .wgt)
        continue-on-error: true
        run: npm run tizen:setup
      # Build the remaining assets + publish the labeled GitHub Release. publish
      # reuses the host installers gathered above and pins the tag to the one pushed.
      - name: Publish labeled GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run publish -- --live
