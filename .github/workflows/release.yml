name: release

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Full 40-character commit SHA to release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.commit_sha }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: resolve
        name: Resolve release version
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$COMMIT_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::commit_sha must be a full 40-character commit SHA"
            exit 1
          fi

          if ! resolved="$(git rev-parse "${COMMIT_SHA}^{commit}" 2>/dev/null)"; then
            echo "::error::commit_sha does not resolve to a commit"
            exit 1
          fi
          git checkout --detach "$resolved"

          version="$(node tools/version.js --print)"
          node tools/version.js --check
          release_tag="$version"
          if ! git check-ref-format "refs/tags/$release_tag"; then
            echo "::error::package version $version does not produce a valid Git tag name"
            exit 1
          fi

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $release_tag already exists"
            exit 1
          fi

          echo "commit_sha=$resolved" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
            tagged="$(git rev-list -n 1 "$release_tag")"
            if [ "$tagged" != "$resolved" ]; then
              echo "::error::Tag $release_tag already points at $tagged, not $resolved"
              exit 1
            fi
            echo "::notice::Tag $release_tag already points at $resolved; release publishing will reuse it."
          fi

  ci:
    needs: preflight
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
    with:
      ref: ${{ needs.preflight.outputs.commit_sha }}

  # The Orsay host bundles a pinned official Node runtime, so it's packaged per
  # target OS/arch and kept independent from the Node version running the build.
  host-binaries:
    needs: [preflight, ci]
    name: host (${{ matrix.label }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, label: macOS arm64, target: macos-arm64, asset: twellie-orsay-host-macos-arm64.zip }
          - { os: macos-15-intel, label: macOS x64, target: macos-x64, asset: twellie-orsay-host-macos-x64.zip }
          - { os: windows-latest, label: Windows x64, target: windows-x64, asset: twellie-orsay-host-windows-x64.zip }
          - { os: windows-latest, label: Windows x86, target: windows-x86, asset: twellie-orsay-host-windows-x86.zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build native host installer
        timeout-minutes: 20
        run: npm run host:package -- ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: host-${{ matrix.target }}
          path: dist/release/${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: [preflight, host-binaries]
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # The host installers come from the per-OS matrix above; drop them where
      # `release:publish` looks so it reuses them instead of cross-building.
      - name: Download host binaries
        uses: actions/download-artifact@v4
        with:
          pattern: host-*
          path: dist/host-bins
          merge-multiple: true
      - name: Gather host installers
        run: mkdir -p dist/release && cp dist/host-bins/*.zip dist/release/
      # Fetch the CLI-only Tizen SDK so `release:publish` can build + sign Twellie.wgt
      # (generic cert; Apps2Samsung re-signs per-TV). Best-effort: if it fails,
      # publish still ships the other assets and just omits the .wgt.
      - name: Set up Tizen CLI (for the .wgt)
        continue-on-error: true
        run: npm run tizen:setup
      # Build the remaining assets + publish the labeled GitHub Release. release:publish
      # reuses the host installers above and creates the version tag at the requested SHA.
      - name: Publish labeled GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.release_tag }}
          RELEASE_ABORT_IF_EXISTS: "1"
          GH_TARGET: ${{ needs.preflight.outputs.commit_sha }}
        run: npm run release:publish -- --live
