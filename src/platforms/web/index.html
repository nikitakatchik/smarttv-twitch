<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Twellie — Web Preview</title>
  <link rel="icon" href="assets/icon/favicon.ico" sizes="any">
  <link rel="icon" href="assets/icon/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="assets/icon/favicon-16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png">
  <link rel="stylesheet" href="ui/styles.css">
  <style>
    /* Web preview chrome overrides the TV-fullscreen assumptions in styles.css. */
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3a3a42; }
    body { position: relative; }
    .page-title {
      position: absolute; left: 0; right: 0; top: 14px; z-index: 3;
      color: #efeff1; font: 700 18px/22px "Helvetica Neue", Arial, sans-serif;
      text-align: center; letter-spacing: 0;
    }
    .repo-button {
      position: absolute; top: 10px; right: 10px; z-index: 4; display: -webkit-box; display: flex;
      -webkit-box-align: center; align-items: center; width: 102px; height: 30px;
      box-sizing: border-box; padding: 0 10px; color: #24292f; background: #f6f8fa;
      border: 1px solid #d0d7de; border-radius: 7px; text-decoration: none;
      box-shadow: 0 8px 22px rgba(0,0,0,0.26);
      font: 700 12px/30px "Helvetica Neue", Arial, sans-serif; letter-spacing: 0;
    }
    .repo-button:hover { background: #ffffff; border-color: #8c959f; }
    .repo-logo { width: 16px; height: 16px; margin-right: 7px; fill: currentColor; }
    .repo-arrow { margin-left: 6px; color: #57606a; font-weight: 700; }
    .tw-stage-wrap {
      height: 100%; box-sizing: border-box; overflow: hidden; padding: 16px;
      display: -webkit-box; display: flex; -webkit-box-align: center; align-items: center;
      -webkit-box-pack: center; justify-content: center; text-align: left;
    }
    .tv-frame {
      position: relative; width: 1280px; height: 720px; margin: 0;
      -webkit-box-flex: 0; flex: 0 0 auto;
      overflow: hidden; border-radius: 10px; box-shadow: 0 16px 60px rgba(0,0,0,0.6);
      background: #000;
    }
    #tw-video, #tw-embed, #app { position: absolute; left: 0; top: 0; width: 1280px; height: 720px; }
    #tw-video { background: #000; z-index: 0; }
    #tw-embed { background: #000; z-index: 0; display: none; }
    #tw-embed iframe { width: 100%; height: 100%; border: 0; display: block; }
    #app { z-index: 1; pointer-events: none; }
    .remote {
      width: 138px; margin: 0 0 0 16px; color: #adadb8; font: 13px/1.5 "Helvetica Neue", Arial, sans-serif;
      -webkit-box-flex: 0; flex: 0 0 138px; text-align: center;
    }
    .remote button {
      width: 40px; height: 40px; margin: 3px; padding: 0; cursor: pointer;
      box-sizing: border-box; line-height: 38px; text-align: center; vertical-align: top; white-space: nowrap;
      background: #26262c; color: #efeff1; border: 1px solid #3a3a44; border-radius: 6px;
      font-size: 13px;
    }
    .remote button:hover { background: #34343c; }
    .remote .r { color: #bd6360; } .remote .g { color: #5f9a6a; }
    .remote .y { color: #c0a05e; }
    .remote .r, .remote .g, .remote .y { font-weight: 700; }
    .remote-button-row { font-size: 0; line-height: 0; }
    .remote-row-spaced { margin-top: 8px; }
    .keyboard-legend { margin-top: 12px; color: #9d9da9; font-size: 12px; }
    .legend-separator {
      width: 52px; height: 0; margin: 0 auto 15px;
      border-top: 1px solid #4a4a55;
    }
    .legend-row { position: relative; height: 23px; margin-top: 4px; }
    .legend-keys {
      position: absolute; right: 50%; top: 0; margin-right: 6px;
      text-align: right; white-space: nowrap;
    }
    .legend-key {
      display: inline-block; color: #efeff1; font: inherit; font-weight: 700;
      line-height: 20px; vertical-align: top;
    }
    .legend-keys .legend-key { margin-left: 6px; }
    .legend-keys .legend-key:first-child { margin-left: 0; }
    .legend-arrow { text-shadow: 0.45px 0 0 currentColor, -0.45px 0 0 currentColor; }
    .legend-action {
      position: absolute; left: 50%; top: 1px; margin-left: 6px;
      text-align: left; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="page-title" id="tw-page-title">📺 Twellie Web Preview</div>
  <a class="repo-button" id="tw-repo-button" href="https://github.com/nkatchik/smarttv-twitch" target="_blank" rel="noopener noreferrer" tabindex="-1" aria-label="Open Twellie repository on GitHub">
    <svg class="repo-logo" viewBox="0 0 16 16" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.86c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
    </svg>
    <span>GitHub</span>
    <span class="repo-arrow">↗</span>
  </a>

  <div class="tw-stage-wrap" id="tw-stage-wrap">
    <div class="tv-frame" id="tw-frame">
      <video id="tw-video" playsinline></video>
      <div id="tw-embed"></div>
      <div id="app"></div>
    </div>

    <div class="remote" id="tw-remote">
      <div class="remote-button-row">
        <button data-tvkey="UP">▲</button>
      </div>
      <div class="remote-button-row">
        <button data-tvkey="LEFT">◀</button>
        <button data-tvkey="ENTER">OK</button>
        <button data-tvkey="RIGHT">▶</button>
      </div>
      <div class="remote-button-row">
        <button data-tvkey="DOWN">▼</button>
      </div>
      <div class="remote-button-row remote-row-spaced">
        <button data-tvkey="RED" class="r">A</button>
        <button data-tvkey="GREEN" class="g">B</button>
        <button data-tvkey="YELLOW" class="y">C</button>
      </div>
      <div class="remote-button-row remote-row-spaced">
        <button data-tvkey="BACK">Back</button>
      </div>
      <div class="keyboard-legend">
        <div class="legend-separator"></div>
        <div class="legend-row">
          <span class="legend-keys"><span class="legend-key legend-arrow">↑</span><span class="legend-key legend-arrow">↓</span><span class="legend-key legend-arrow">←</span><span class="legend-key legend-arrow">→</span></span>
          <span class="legend-action">navigate</span>
        </div>
        <div class="legend-row">
          <span class="legend-keys"><span class="legend-key">Enter</span></span>
          <span class="legend-action">select</span>
        </div>
        <div class="legend-row">
          <span class="legend-keys"><span class="legend-key">Backspace</span></span>
          <span class="legend-action">back</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function (global) {
      function setScale(el, scale) {
        if (!el) { return; }
        var value = scale === 1 ? '' : 'scale(' + scale + ')';
        el.style.WebkitTransform = value;
        el.style.transform = value;
        el.style.WebkitTransformOrigin = 'left top';
        el.style.transformOrigin = 'left top';
      }

      function fitWebPreview() {
        var wrap = global.document.getElementById('tw-stage-wrap');
        var frame = global.document.getElementById('tw-frame');
        var remote = global.document.getElementById('tw-remote');
        var title = global.document.getElementById('tw-page-title');
        var repo = global.document.getElementById('tw-repo-button');
        var video = global.document.getElementById('tw-video');
        var embed = global.document.getElementById('tw-embed');
        var app = global.document.getElementById('app');
        if (!wrap || !frame || !remote) { return; }

        var minSpace = 16;
        var minPageWidth = 960;
        var minPageHeight = 500;
        var viewportWidth = Math.max(global.innerWidth || 1280, minPageWidth);
        var viewportHeight = Math.max(global.innerHeight || 720, minPageHeight);
        var remoteWidth = remote.offsetWidth;
        var titleHeight = title ? title.offsetHeight : 0;
        var repoHeight = repo ? repo.offsetHeight : 0;
        var hasTitleRow = title || repo;
        var titleGap = hasTitleRow ? 8 : 0;
        var titleBand = hasTitleRow ? Math.max(titleHeight, repoHeight) + (titleGap * 2) : minSpace;
        var widthScale = (viewportWidth - remoteWidth - (minSpace * 3)) / 1280;
        var heightScale = (viewportHeight - (titleBand * 2)) / 720;
        var scale = Math.min(1, widthScale, heightScale);
        if (scale < 0.05) { scale = 0.05; }

        var frameWidth = Math.round(1280 * scale);
        var frameHeight = Math.round(720 * scale);
        var space = Math.floor((viewportWidth - frameWidth - remoteWidth) / 3);
        if (space < minSpace) { space = minSpace; }

        wrap.style.width = viewportWidth + 'px';
        wrap.style.height = viewportHeight + 'px';
        wrap.style.padding = minSpace + 'px ' + space + 'px';
        remote.style.marginLeft = space + 'px';
        frame.style.width = frameWidth + 'px';
        frame.style.height = frameHeight + 'px';
        setScale(video, scale);
        setScale(embed, scale);
        setScale(app, scale);

        if (hasTitleRow) {
          var frameRect = frame.getBoundingClientRect();
          if (title) {
            title.style.top = Math.max(0, (frameRect.top - title.offsetHeight) / 2) + 'px';
          }
          if (repo) {
            var titleTop = title ? parseFloat(title.style.top) : NaN;
            if (isNaN(titleTop)) { titleTop = title ? title.getBoundingClientRect().top : minSpace; }
            var repoTop = title ? titleTop + ((title.offsetHeight - repo.offsetHeight) / 2) : minSpace;
            if (repoTop < 0) { repoTop = 0; }
            repo.style.top = repoTop + 'px';
            repo.style.right = repoTop + 'px';
            repo.style.left = '';
          }
        }
      }

      if (global.document.readyState === 'loading') {
        global.document.addEventListener('DOMContentLoaded', fitWebPreview, false);
      } else {
        fitWebPreview();
      }
      global.addEventListener('resize', fitWebPreview, false);
    })(this);
  </script>
